<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockForge</title>
  <link rel="stylesheet" href="popup.css">

  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    
    <!-- Top Header (Simplified) -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>
        <div class="logo-text">
          <span class="brand">BlockForge</span>
        </div>
      </div>
      <div class="site-info-pill">
        <span class="status-dot active" id="siteStatusDot"></span>
        <span class="site-hostname" id="hostname">Loading...</span>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- TAB: OVERVIEW -->
      <div class="tab-content active" id="tab-overview">
        
        <!-- Central Power Core -->
        <div class="power-core-container">
          <button class="power-core active" id="powerBtn" title="Toggle Protection">
            <div class="power-ring"></div>
            <div class="power-icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
              </svg>
            </div>
          </button>
          <div class="core-status" id="siteStatusText">Protection Active</div>
        </div>

        <!-- 2x2 Stats Grid -->
        <div class="stats-grid-2x2">
          <div class="grid-card stat-ads">
            <div class="grid-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg></div>
            <div class="grid-data">
              <span class="grid-value" id="pageAds">0</span>
              <span class="grid-label">Ads</span>
            </div>
          </div>
          <div class="grid-card stat-trackers">
            <div class="grid-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path></svg></div>
            <div class="grid-data">
              <span class="grid-value" id="pageTrackers">0</span>
              <span class="grid-label">Trackers</span>
            </div>
          </div>
          <div class="grid-card stat-miners">
            <div class="grid-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0a2.12 2.12 0 0 1 0-3L12 11"></path></svg></div>
            <div class="grid-data">
              <span class="grid-value" id="pageMiners">0</span>
              <span class="grid-label">Miners</span>
            </div>
          </div>
          <div class="grid-card stat-malware">
            <div class="grid-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>
            <div class="grid-data">
              <span class="grid-value" id="pageMalware">0</span>
              <span class="grid-label">Malware</span>
            </div>
          </div>
        </div>

        <div class="actions-section">
          <button class="action-btn zap" id="zapElementBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            Zap Element
          </button>
        </div>
        
        <!-- Total Blocked (Global) Hidden in the new UI, but JS needs the elements so we hide them gracefully -->
        <div style="display:none">
            <span id="pageTotal">0</span>
            <span id="pageOther">0</span>
            <span id="totalBlocked">0</span>
            <span id="totalAds">0</span>
            <span id="totalTrackers">0</span>
            <span id="dataSaved">0</span>
        </div>
      </div>

      <!-- TAB: BLOCKED ITEMS -->
      <div class="tab-content" id="tab-blocked">
        <div class="blocked-section">
          <div class="blocked-header">
            <h3 class="section-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg> Activity on this page (<span id="blockedCount">0</span>)</h3>
            <button class="refresh-btn" id="refreshBlockedBtn" title="Refresh"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></button>
          </div>
          <div class="blocked-filter">
            <select id="blockedFilter" title="Filter blocked items by type">
              <option value="all">All Types</option>
              <option value="ad">Ads</option>
              <option value="tracker">Trackers</option>
              <option value="miner">Miners</option>
              <option value="malware">Malware</option>
            </select>
          </div>
          <div class="blocked-list glass-panel" id="blockedList">
            <div class="empty-state">No items blocked yet</div>
          </div>
        </div>

        <div class="unblocks-section">
          <h3 class="section-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> Allowed Sites/Rules</h3>
          <div class="unblocked-list glass-panel" id="unblockedList">
            <div class="empty-state">No custom exceptions</div>
          </div>
          <div class="add-exception glass-panel">
            <input type="text" id="exceptionInput" placeholder="Enter URL pattern...">
            <button class="add-btn" id="addExceptionBtn">Allow</button>
          </div>
        </div>
      </div>

      <!-- TAB: SETTINGS -->
      <div class="tab-content" id="tab-settings">
        <div class="settings-section">
          <h3 class="section-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Quick Settings</h3>
          
          <div class="settings-grid">
            <label class="setting-card glass-panel" for="toggleAds">
              <span class="setting-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon></svg></span>
              <span class="setting-name">Block Ads</span>
              <div class="toggle"><input type="checkbox" id="toggleAds" checked><span class="toggle-slider"></span></div>
            </label>
            <label class="setting-card glass-panel" for="toggleTrackers">
              <span class="setting-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path></svg></span>
              <span class="setting-name">Block Trackers</span>
              <div class="toggle"><input type="checkbox" id="toggleTrackers" checked><span class="toggle-slider"></span></div>
            </label>
            <label class="setting-card glass-panel" for="toggleMiners">
              <span class="setting-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0a2.12 2.12 0 0 1 0-3L12 11"></path></svg></span>
              <span class="setting-name">Block Miners</span>
              <div class="toggle"><input type="checkbox" id="toggleMiners" checked><span class="toggle-slider"></span></div>
            </label>
            <label class="setting-card glass-panel" for="toggleFingerprint">
              <span class="setting-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect></svg></span>
              <span class="setting-name">Anti-Fingerprint</span>
              <div class="toggle"><input type="checkbox" id="toggleFingerprint" checked><span class="toggle-slider"></span></div>
            </label>
            <label class="setting-card glass-panel" for="toggleAnnoyances">
              <span class="setting-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg></span>
              <span class="setting-name">Block Annoyances</span>
              <div class="toggle"><input type="checkbox" id="toggleAnnoyances" checked><span class="toggle-slider"></span></div>
            </label>
            <label class="setting-card glass-panel" for="toggleOTA">
              <span class="setting-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 3.43-11.44l-5.06 5.06"></path></svg></span>
              <span class="setting-name">Auto-Update</span>
              <div class="toggle"><input type="checkbox" id="toggleOTA"><span class="toggle-slider"></span></div>
            </label>
          </div>
        </div>

        <div class="actions-section">
          <button class="action-btn" id="openDashboard">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg> 
            Analytics Dashboard
          </button>
          <button class="action-btn" id="openSettings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> 
            All Settings
          </button>
          <button class="action-btn" id="clearZapperBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg> 
            Clear Zapped Elements
          </button>
        </div>
      </div>
      
    </main>

    <!-- Floating Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-tab="overview">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Overview</span>
      </button>
      <button class="nav-item" data-tab="blocked">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span>Activity</span>
      </button>
      <button class="nav-item" data-tab="settings">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <button id="siteToggleBtn" style="display:none"></button>
  <button id="resetStats" style="display:none"></button>

  <script src="../shared/utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
